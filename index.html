<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Тряфа фотограф</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Мой виртуальный дом</h1>

<div class="room">
  <img id="portfolioObj" class="object" src="images/portfolio-icon.png">
  <img id="blogObj" class="object" src="images/blog-icon.png">
  <img id="resumeObj" class="object" src="images/resume-icon.png">
  <img id="contactsObj" class="object" src="images/contacts-icon.png">
</div>

<div id="portfolioPopup" class="popup">
  <span class="closeBtn" onclick="closePopup('portfolioPopup')">×</span>
  <h2>Портфолио</h2>
  <div id="gallery" class="portfolio"></div>
  <input type="file" id="upload" multiple>
</div>

<div id="blogPopup" class="popup">
  <span class="closeBtn" onclick="closePopup('blogPopup')">×</span>
  <h2>Блог</h2>
  <textarea id="blogText" placeholder="Пиши сюда..."></textarea>
</div>

<div id="resumePopup" class="popup">
  <span class="closeBtn" onclick="closePopup('resumePopup')">×</span>
  <h2>Резюме</h2>
  <p>Твой опыт и навыки</p>
</div>

<div id="contactsPopup" class="popup">
  <span class="closeBtn" onclick="closePopup('contactsPopup')">×</span>
  <h2>Контакты</h2>
  <p>Email: example@email.com</p>
</div>

<script src="script.js"></script>
</body>
</html>
